<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CS Jobs → Sheffield Digital — Settings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #1a1a2e;
      background: #f4f6fa;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      padding: 32px 36px;
      width: 100%;
      max-width: 520px;
      height: fit-content;
    }

    header {
      margin-bottom: 28px;
    }

    header h1 {
      font-size: 20px;
      font-weight: 700;
      color: #1c3d6e;
    }

    header p {
      font-size: 13px;
      color: #666;
      margin-top: 6px;
      line-height: 1.5;
    }

    .field-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #555;
      margin-bottom: 6px;
    }

    label .hint {
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      color: #888;
    }

    input[type="text"],
    input[type="password"],
    input[type="url"] {
      width: 100%;
      height: 38px;
      padding: 0 10px;
      border: 1px solid #d4d4d8;
      border-radius: 5px;
      font-size: 13px;
      color: #1a1a2e;
      background: #fafafa;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #1c3d6e; background: #fff; }

    .password-wrap {
      position: relative;
    }

    .password-wrap input { padding-right: 70px; }

    .btn-show-pass {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 12px;
      color: #1c3d6e;
      cursor: pointer;
      padding: 2px 6px;
    }

    .divider {
      border: none;
      border-top: 1px solid #e8e8e8;
      margin: 24px 0;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-save {
      height: 38px;
      padding: 0 24px;
      background: #1c3d6e;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s;
    }

    .btn-save:hover { background: #163260; }

    #save-status {
      font-size: 13px;
      font-weight: 500;
    }

    .status-ok  { color: #16a34a; }
    .status-err { color: #b91c1c; }

    .note {
      font-size: 12px;
      color: #888;
      line-height: 1.5;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <header>
      <h1>Sheffield Digital API Settings</h1>
      <p>Credentials are stored locally in Chrome. You can get them from Sheffield Digital when you register for API access.</p>
    </header>

    <div class="field-group">
      <label for="endpoint">API Endpoint URL</label>
      <input type="url" id="endpoint" placeholder="https://sheffield.digital/wp-json/jobboard/v1/job">
      <p class="note">The default value is correct for Sheffield Digital's current job board. Only change this if instructed to by tech@sheffield.digital.</p>
    </div>

    <div class="field-group">
      <label for="username">Username <span class="hint">(your Sheffield Digital website account username)</span></label>
      <input type="text" id="username" placeholder="your-username" autocomplete="username">
    </div>

    <div class="field-group">
      <label for="password">API Key <span class="hint">(request from info@sheffield.digital)</span></label>
      <div class="password-wrap">
        <input type="password" id="password" placeholder="1234 5678 0ABC DEF0 1234 5678" autocomplete="current-password">
        <button class="btn-show-pass" id="btn-show-pass" type="button">Show</button>
      </div>
    </div>

    <hr class="divider">

    <div class="actions">
      <button class="btn-save" id="btn-save">Save settings</button>
      <span id="save-status"></span>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
